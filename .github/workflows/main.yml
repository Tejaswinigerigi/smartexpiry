name: Build Android APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install deps
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-dev build-essential libffi-dev libssl-dev
        pip install buildozer==1.5.0 cython==0.29.33
    - name: Build APK
      run: |
        yes | buildozer android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SmartExpiry-APK
        path: bin/*.apk
