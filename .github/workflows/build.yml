name: Build Android APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          git zip unzip \
          openjdk-17-jdk \
          python3-dev \
          build-essential \
          libffi-dev \
          libssl-dev \
          autoconf \
          libtool \
          pkg-config
        pip install buildozer==1.5.0
        pip install cython==0.29.33

    - name: Create main.py
      run: |
        cat > main.py << 'EOF'
        from kivy.app import App
        from kivy.uix.boxlayout import BoxLayout
        from kivy.uix.label import Label
        from kivy.uix.button import Button
        from kivy.uix.textinput import TextInput
        from kivy.clock import Clock
        import urllib.request
        import json
        import threading

        SERVER = "http://192.168.43.1:5000"

        class MainLayout(BoxLayout):
            def __init__(self, **kwargs):
                super().__init__(
                    orientation="vertical",
                    padding=10, spacing=8,
                    **kwargs
                )
                self.cart = []
                self.total = 0

                self.add_widget(Label(
                    text="Smart Expiry Detection",
                    font_size="20sp", bold=True,
                    size_hint_y=None, height=60
                ))

                self.barcode = TextInput(
                    hint_text="Enter barcode...",
                    multiline=False,
                    input_filter="int",
                    font_size="18sp",
                    size_hint_y=None, height=50
                )
                self.add_widget(self.barcode)

                btn = Button(
                    text="SCAN PRODUCT",
                    font_size="16sp",
                    size_hint_y=None, height=52
                )
                btn.bind(on_press=self.scan)
                self.add_widget(btn)

                self.result = Label(
                    text="Enter barcode and tap Scan",
                    font_size="14sp",
                    markup=True,
                    size_hint_y=None, height=160,
                    halign="center"
                )
                self.add_widget(self.result)

                self.action = Button(
                    text="",
                    font_size="15sp",
                    size_hint_y=None, height=52,
                    opacity=0
                )
                self.add_widget(self.action)

                self.cart_lbl = Label(
                    text="Cart: Empty",
                    font_size="13sp",
                    size_hint_y=None, height=100
                )
                self.add_widget(self.cart_lbl)

            def scan(self, instance):
                code = self.barcode.text.strip()
                if not code:
                    return
                self.result.text = "Scanning..."
                threading.Thread(
                    target=self._fetch,
                    args=(code,),
                    daemon=True
                ).start()

            def _fetch(self, code):
                try:
                    data = json.dumps(
                        {"barcode": code}
                    ).encode()
                    req = urllib.request.Request(
                        SERVER + "/scan",
                        data=data,
                        headers={
                            "Content-Type":
                            "application/json"
                        },
                        method="POST"
                    )
                    with urllib.request.urlopen(
                        req, timeout=5
                    ) as r:
                        result = json.loads(r.read())
                    Clock.schedule_once(
                        lambda dt: self.show(result)
                    )
                except Exception as e:
                    Clock.schedule_once(
                        lambda dt: self.show_err()
                    )

            def show(self, data):
                if "error" in data:
                    self.result.text = (
                        "[color=ff0000]"
                        "Product not found!"
                        "[/color]"
                    )
                    return
                c = {
                    "EXPIRED"    : "ef4444",
                    "CRITICAL"   : "f97316",
                    "NEAR EXPIRY": "eab308",
                    "SAFE"       : "22c55e"
                }.get(data["label"], "22c55e")

                self.result.text = (
                    f"[b]{data['name']}[/b]\n"
                    f"[color={c}]"
                    f"{data['label']}[/color]\n"
                    f"Expiry: {data['exp_date']}\n"
                    f"Price: Rs.{data['price']}"
                )
                self.action.opacity = 1
                if data["blocked"]:
                    self.action.text = "BLOCKED!"
                    self.action.background_color = (
                        0.94, 0.27, 0.27, 1
                    )
                else:
                    self.action.text = "Added to Cart!"
                    self.action.background_color = (
                        0.13, 0.77, 0.37, 1
                    )
                    self.cart.append(data["name"])
                    self.total += data["price"]
                    self.cart_lbl.text = (
                        "Cart:\n" +
                        "\n".join(self.cart) +
                        f"\nTotal: Rs.{self.total}"
                    )
                self.barcode.text = ""

            def show_err(self):
                self.result.text = (
                    "[color=ff0000]"
                    "Cannot connect!\n"
                    "Check Flask is running"
                    "[/color]"
                )

        class SmartExpiryApp(App):
            def build(self):
                return MainLayout()

        if __name__ == "__main__":
            SmartExpiryApp().run()
        EOF
        echo "✅ main.py created"

    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'EOF'
        [app]
        title = SmartExpiry
        package.name = smartexpiry
        package.domain = com.tejaswini
        source.dir = .
        source.include_exts = py
        version = 1.0
        requirements = python3,kivy==2.2.1
        orientation = portrait
        android.permissions = INTERNET
        android.minapi = 21
        android.archs = arm64-v8a
        fullscreen = 0

        [buildozer]
        log_level = 2
        warn_on_root = 1
        EOF
        echo "✅ spec created"

    - name: Build APK
      run: |
        yes | buildozer android debug 2>&1

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SmartExpiry-APK
        path: bin/*.apk
        if-no-files-found: warn
